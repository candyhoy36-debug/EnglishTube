    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
        // NewPipeExtractor is published only through JitPack.
        maven { url 'https://jitpack.io' }
    }
}

rootProject.name = "EnglishTube"
include ':app'
